<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .category-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            background: #333;
            padding: 10px;
            border-radius: 5px;
        }
        .category-name { width: 150px; font-weight: bold; }
        .category-controls { flex-grow: 1; display: flex; gap: 10px; align-items: center; }
        input[type="text"].admin-input, input[type="password"].admin-input { width: auto; margin: 0; padding: 5px; font-size: 14px; }
    </style>
</head>
<body>
    <div id="adminPage">
        <h1>Admin Dashboard</h1>
        
        <input type="password" id="adminKey" placeholder="Current Master Key" onblur="fetchCategories()">
        <button onclick="fetchCategories()" style="margin-bottom: 20px;">Load Settings</button>

        <div id="categoriesContainer" style="display: none;">
            <!-- Categories injected here -->
        </div>
        
        <button onclick="updateSettings()" id="saveBtn" style="display: none; margin-top:20px; width:100%;">Save Category Settings</button>
        <div id="adminMessage" style="margin-top: 10px; font-weight:bold;"></div>

        <div id="changeKeyContainer" style="display: none; margin-top: 40px; padding-top: 20px; border-top: 1px solid #555;">
            <h2>Change Master Key</h2>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <input type="password" id="newAdminKey" class="admin-input" placeholder="New Master Key (min 4 chars)">
                <button onclick="changeMasterKey()">Update Master Key</button>
            </div>
            <div id="keyMessage" style="margin-top: 10px; font-weight:bold;"></div>
        </div>

    </div>
    
    <script>
        let loadedCategories = [];

        async function fetchCategories() {
            const adminKey = document.getElementById("adminKey").value;
            const messageEl = document.getElementById("adminMessage");
            if(!adminKey) return;

            try {
                const res = await fetch("/api/admin", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ adminKey, action: "fetch" })
                });

                if (res.ok) {
                    const data = await res.json();
                    if(data.success) {
                        loadedCategories = data.categories;
                        renderCategories();
                        document.getElementById("categoriesContainer").style.display = "block";
                        document.getElementById("saveBtn").style.display = "block";
                        document.getElementById("changeKeyContainer").style.display = "block";
                        messageEl.innerText = "Connected Securely!";
                        messageEl.style.color = "lightgreen";
                    } else {
                         messageEl.innerText = "Error: " + data.error;
                         messageEl.style.color = "red";
                    }
                } else {
                    const error = await res.json();
                    messageEl.innerText = error.error || "Authentication failed.";
                    messageEl.style.color = "red";
                    document.getElementById("categoriesContainer").style.display = "none";
                    document.getElementById("saveBtn").style.display = "none";
                    document.getElementById("changeKeyContainer").style.display = "none";
                }
            } catch(e) {
                messageEl.innerText = "Network Error!";
                messageEl.style.color = "red";
            }
        }

        function renderCategories() {
            const container = document.getElementById("categoriesContainer");
            let html = "";
            loadedCategories.forEach(cat => {
                html += `
                <div class="category-row">
                    <div class="category-name">${cat.name} (${cat.code})</div>
                    <div class="category-controls">
                        <label><input type="checkbox" id="vis_${cat.code}" ${cat.is_visible ? "checked" : ""}> Visible</label>
                        <input type="text" class="admin-input" id="pass_${cat.code}" value="${cat.quiz_password}" placeholder="Set Password">
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        async function updateSettings() {
            const adminKey = document.getElementById("adminKey").value;
            const messageEl = document.getElementById("adminMessage");

            const updatedCategories = loadedCategories.map(cat => {
                return {
                    code: cat.code,
                    is_visible: document.getElementById(`vis_${cat.code}`).checked,
                    quiz_password: document.getElementById(`pass_${cat.code}`).value
                };
            });

            try {
                const res = await fetch("/api/admin", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ adminKey, action: "update", categories: updatedCategories })
                });

                if (res.ok) {
                    messageEl.innerText = "Category settings saved successfully!";
                    messageEl.style.color = "lightgreen";
                } else {
                    const data = await res.json();
                    messageEl.innerText = "Error: " + data.error;
                    messageEl.style.color = "red";
                }
            } catch (e) {
                messageEl.innerText = "Network Error during save!";
                messageEl.style.color = "red";
            }
        }

        async function changeMasterKey() {
            const adminKey = document.getElementById("adminKey").value;
            const newKey = document.getElementById("newAdminKey").value;
            const messageEl = document.getElementById("keyMessage");

            if (!newKey) {
                messageEl.innerText = "Please enter a new key.";
                messageEl.style.color = "red";
                return;
            }

            try {
                const res = await fetch("/api/admin", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ adminKey, action: "update_key", newKey })
                });

                if (res.ok) {
                    messageEl.innerText = "Master key changed successfully!";
                    messageEl.style.color = "lightgreen";
                    document.getElementById("adminKey").value = newKey;
                    document.getElementById("newAdminKey").value = "";
                } else {
                    const data = await res.json().catch(()=>({}));
                    messageEl.innerText = "Error: " + (data.error || "Could not change key");
                    messageEl.style.color = "red";
                }
            } catch (e) {
                messageEl.innerText = "Network Error!";
                messageEl.style.color = "red";
            }
        }
    </script>
</body>
</html>
